services:
  ipsa-web:
    build: .
    container_name: ipsa-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - GA_MEASUREMENT_ID=${GA_MEASUREMENT_ID:-}
      - GOOGLE_SITE_VERIFICATION=${GOOGLE_SITE_VERIFICATION:-}
      - BING_SITE_VERIFICATION=${BING_SITE_VERIFICATION:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-ventas.mexico@ipsa-cv.com.mx}
      - RESEND_FROM=${RESEND_FROM:-IPSA Web <onboarding@resend.dev>}
    labels:
      - "traefik.enable=true"
      # HTTPS router for ipsa.scram2k.com (Let's Encrypt)
      - "traefik.http.routers.ipsa-web.rule=Host(`ipsa.scram2k.com`)"
      - "traefik.http.routers.ipsa-web.entrypoints=websecure"
      - "traefik.http.routers.ipsa-web.tls.certresolver=letsencrypt"
      # HTTPS router for ipsacv.com.mx (Cloudflare handles public SSL, connects to Traefik via HTTPS)
      - "traefik.http.routers.ipsa-web-cf.rule=Host(`ipsacv.com.mx`) || Host(`www.ipsacv.com.mx`)"
      - "traefik.http.routers.ipsa-web-cf.entrypoints=websecure"
      - "traefik.http.routers.ipsa-web-cf.tls=true"
      - "traefik.http.routers.ipsa-web-cf.middlewares=ipsa-www-redirect"
      # Redirect www to non-www
      - "traefik.http.middlewares.ipsa-www-redirect.redirectregex.regex=^https?://www\\.ipsacv\\.com\\.mx/(.*)"
      - "traefik.http.middlewares.ipsa-www-redirect.redirectregex.replacement=https://ipsacv.com.mx/$${1}"
      - "traefik.http.middlewares.ipsa-www-redirect.redirectregex.permanent=true"
      # Service
      - "traefik.http.services.ipsa-web.loadbalancer.server.port=3000"
    networks:
      - traefik
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  traefik:
    external: true
